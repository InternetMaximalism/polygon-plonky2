[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.29"
via_ir = true
evm_version = "prague"
optimizer = true
# Runtime-heavy verifier: optimize aggressively for execution cost, not deploy size.
optimizer_runs = 4294967295
fs_permissions = [{ access = "read", path = "./" }]
